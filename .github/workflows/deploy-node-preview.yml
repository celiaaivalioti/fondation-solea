name: Deploy Node preview to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-node-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd /srv/customer/sites/preview.fondation-solea.ch
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            echo "Preview build updated. Restart the Node app in Infomaniak if the running process does not reload automatically."
