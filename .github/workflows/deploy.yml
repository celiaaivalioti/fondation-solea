name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Never cancel a deploy mid-flight: a new push queues behind it instead,
# so the server is never left half-updated.
concurrency:
  group: deploy-infomaniak
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Give the bundle a start script so the Infomaniak start command
          # can stay "npm run start" (it simply runs node server.js).
          node -e "const fs=require('fs');const p='.next/standalone/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.scripts={...(j.scripts||{}),start:'node server.js'};fs.writeFileSync(p,JSON.stringify(j,null,2));"

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass || (sudo apt-get update -qq && sudo apt-get install -y -qq sshpass)

      # The server never builds anything: its SSH sessions are capped at
      # 1 GB of memory, which kills npm ci / next build. We rsync the
      # ready-to-run standalone bundle instead.
      - name: Upload to Infomaniak
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          SSH_PORT: ${{ secrets.INFOMANIAK_SSH_PORT }}
        run: |
          RSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -p $SSH_PORT"
          DEST="$SSH_USER@$SSH_HOST:/srv/customer/sites/preview.fondation-solea.ch"
          rsync -az --delete -e "$RSH" .next/standalone/ "$DEST/"
          echo "Upload done."

      - name: Restart Node app
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          SSH_PORT: ${{ secrets.INFOMANIAK_SSH_PORT }}
        run: |
          # Best effort: Infomaniak supervises the app process and restarts
          # it when it exits. If the app runs outside the SSH container this
          # is a no-op — restart from the Manager in that case.
          # The kill can take down the SSH session container with it, making
          # ssh report an error even though the restart worked — tolerate it.
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "pkill -f '[s]erver\.js' > /dev/null 2>&1; pkill -f '[n]ext start' > /dev/null 2>&1; echo restart-signal-sent" || true
