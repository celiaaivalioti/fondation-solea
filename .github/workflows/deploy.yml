name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    name: Lint and build
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-check
      cancel-in-progress: true

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

  deploy:
    name: Deploy Node preview
    runs-on: ubuntu-latest
    needs: check

    # Never cancel a deploy mid-flight: a new push queues behind it instead,
    # so the server is never left half-updated.
    concurrency:
      group: deploy-node-preview
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass || (sudo apt-get update -qq && sudo apt-get install -y -qq sshpass)

      - name: Deploy over SSH
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          SSH_PORT: ${{ secrets.INFOMANIAK_SSH_PORT }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
          sshpass -e scp $SSH_OPTS -P "$SSH_PORT" scripts/deploy-remote.sh "$SSH_USER@$SSH_HOST:/tmp/deploy-remote.sh"
          sshpass -e ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "bash /tmp/deploy-remote.sh"
