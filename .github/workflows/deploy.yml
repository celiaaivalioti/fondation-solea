name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    name: Lint and build
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-check
      cancel-in-progress: true

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build

  deploy:
    name: Deploy Node preview
    runs-on: ubuntu-latest
    needs: check

    # Never cancel a deploy mid-flight: a new push queues behind it instead,
    # so the server is never left half-updated.
    concurrency:
      group: deploy-node-preview
      cancel-in-progress: false

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script: |
            set -e
            cd /srv/customer/sites/preview.fondation-solea.ch
            # First deploy: the directory may exist without being a git clone.
            # git reset --hard keeps untracked files (.env.local, node_modules).
            if [ ! -d .git ]; then
              git init -b main
              git remote add origin https://github.com/celiaaivalioti/fondation-solea.git
            fi
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            # Infomaniak supervises the Node process and restarts it if it
            # exits, so killing it is how we pick up the new build.
            pkill -f "next start" || true
            echo "Deploy finished. The Node process was asked to restart with the new build."
