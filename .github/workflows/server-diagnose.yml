name: Server diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Inspect server layout over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script: |
            cd /srv/customer/sites/preview.fondation-solea.ch || exit 1
            echo "--- dir contents ---"
            ls -la | head -30
            echo "--- git state ---"
            git rev-parse --is-inside-work-tree 2>&1 || true
            git remote -v 2>&1 || true
            git log --oneline -1 2>&1 || true
            echo "--- outbound https ---"
            curl -sI --max-time 10 https://github.com 2>&1 | head -2 || echo "curl to github failed"
            echo "--- disk ---"
            df -h . 2>&1 | tail -1 || true
            echo "--- fetch test ---"
            git fetch --quiet origin main > /tmp/fetch.log 2>&1
            echo "fetch rc=$?"
            tail -5 /tmp/fetch.log 2>/dev/null || true
            echo "--- done ---"
