name: Server diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Inspect server layout over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script: |
            echo "--- site dir ---"
            ls -la "$HOME/sites/fondation-solea.ch" || true
            echo "--- node search ---"
            ls /usr/local/bin 2>/dev/null | head -20 || true
            ls /opt 2>/dev/null || true
            find "$HOME" -maxdepth 3 -name "node" -o -maxdepth 3 -name ".nvm" 2>/dev/null || true
            compgen -c | grep -iE "^node|^npm|^nvm" | sort -u || true
            echo "--- login shell env ---"
            bash -lc 'command -v node npm; node -v 2>/dev/null' || true
            cat "$HOME/.profile" "$HOME/.bashrc" 2>/dev/null | grep -viE "password|secret" | head -20 || true
            echo "--- running processes ---"
            ps aux 2>/dev/null | grep -iE "node|next" | grep -v grep || echo "no node processes"
            echo "--- os ---"
            cat /etc/os-release 2>/dev/null | head -3 || true
