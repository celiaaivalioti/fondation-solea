name: Server diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Test git fetch with auto-gc disabled
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script: |
            cd /srv/customer/sites/preview.fondation-solea.ch || exit 1
            echo "test1: fetch with gc disabled"
            git -c gc.auto=0 -c gc.autoDetach=false fetch --quiet origin main
            echo "test1 rc=$?"
            echo "test2: reset"
            git reset --quiet --hard origin/main
            echo "test2 rc=$?"
            echo "test3: loose object count"
            git count-objects
            echo "test4: plain no-op fetch (the failing case)"
            git fetch --quiet origin main
            echo "test4 rc=$?"
            echo "all done"
