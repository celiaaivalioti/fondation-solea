name: Server diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Check deployed bundle and process
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script: |
            cd /srv/customer/sites/preview.fondation-solea.ch || exit 1
            echo "--- site dir (should be standalone bundle only) ---"
            ls -la | head -20
            echo "--- BUILD_ID ---"
            cat .next/BUILD_ID 2>/dev/null || echo "no BUILD_ID"
            echo "--- start script ---"
            grep -A2 '"scripts"' package.json 2>/dev/null || true
            echo "--- node processes ---"
            ps aux 2>/dev/null | grep -iE "node|server.js|next" | grep -v grep || echo "no node processes visible from SSH container"
