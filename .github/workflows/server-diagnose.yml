name: Server diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Inspect server layout over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USERNAME }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          port: ${{ secrets.INFOMANIAK_SSH_PORT }}
          script: |
            echo "HOME=$HOME  PWD=$(pwd)"
            echo "--- home ---"
            ls -la "$HOME" || true
            echo "--- sites ---"
            ls -la "$HOME/sites" 2>/dev/null || ls -la /srv/customer/sites 2>/dev/null || true
            echo "--- tooling ---"
            command -v git rsync pkill curl || true
            git --version 2>/dev/null || echo "no git"
            echo "--- env hints ---"
            env | grep -iE "^(PORT|NODE_ENV|HOST)=" || echo "no PORT/NODE_ENV in env"
